<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OCTOPUS GPT</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>

    <style>
        :root {
            --bg: #000000;
            --accent: #ff0000;
            --sidebar-bg: #050505;
            --border: #1a1a1a;
            --text: #ffffff;
            --dim: #444444;
            /* VS Code Highlighting Colors */
            --vs-keyword: #569cd6; 
            --vs-func: #dcdcaa;    
            --vs-string: #ce9178;  
            --vs-comment: #6a9955;
            --pink: #ff79c6;
        }

        * { box-sizing: border-box; font-family: 'Inter', sans-serif; outline: none; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); margin: 0; height: 100vh; display: flex; overflow: hidden; }

        /* --- AUTH GUARD --- */
        #auth-guard { position: fixed; inset: 0; background: #000; z-index: 5000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-panel { background: #050505; border: 1px solid var(--border); padding: 30px; border-radius: 24px; width: 100%; max-width: 400px; text-align: center; }
        .auth-panel input { width: 100%; padding: 15px; background: #000; border: 1px solid var(--border); color: #fff; margin-bottom: 12px; border-radius: 12px; text-align: center; }
        .auth-go { width: 100%; padding: 16px; background: var(--accent); color: #000; border: none; font-weight: 900; cursor: pointer; border-radius: 12px; margin-top: 10px; }

        /* --- SIDEBAR --- */
        #nav-dim { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; display: none; backdrop-filter: blur(8px); }
        nav { 
            position: fixed; top: 0; left: -300px; width: 300px; height: 100%;
            background: var(--sidebar-bg); border-right: 1px solid var(--border); 
            display: flex; flex-direction: column; padding: 25px; z-index: 1001;
            transition: left 0.4s cubic-bezier(0.19, 1, 0.22, 1);
        }
        nav.open { left: 0; }
        #nav-dim.open { display: block; }
        .nav-logo { display: flex; align-items: center; gap: 12px; margin-bottom: 40px; }
        .logo-sq { width: 30px; height: 30px; background: var(--accent); border-radius: 4px; box-shadow: 0 0 15px var(--accent); }
        .logo-txt { font-weight: 800; font-size: 18px; letter-spacing: 1px; }

        /* --- MAIN AREA --- */
        main { flex: 1; display: flex; flex-direction: column; height: 100%; position: relative; width: 100%; }
        header { 
            padding: 25px 20px 15px 20px; 
            border-bottom: 1px solid var(--border); 
            display: grid; 
            grid-template-columns: 40px 1fr 40px; 
            align-items: center; 
            background: rgba(0,0,0,0.9); 
            backdrop-filter: blur(10px); 
            z-index: 10; 
        }
        #menu-trigger { font-size: 26px; color: var(--accent); cursor: pointer; }
        .header-title { font-weight: 900; font-size: 15px; color: var(--accent); letter-spacing: 2px; text-align: center; }

        /* --- CHAT FLOW --- */
        #chat-flow { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; width: 100%; }
        .bubble { max-width: 88%; font-size: 14px; line-height: 1.6; word-wrap: break-word; position: relative; animation: slideUp 0.3s ease; }
        .bot-msg { border-left: 2px solid var(--accent); padding: 12px 15px; color: #ececec; background: rgba(255,0,0,0.03); width: fit-content; }
        .user-msg { align-self: flex-end; background: #111; border: 1px solid var(--border); padding: 12px 18px; border-radius: 18px 18px 0 18px; color: var(--text); }

        /* --- VS CODE STYLE BLOCKS --- */
        pre { background: #0d0d0d !important; border: 1px solid #222; padding: 15px; border-radius: 8px; margin: 10px 0; overflow-x: auto; }
        code { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #d4d4d4; }
        .kw { color: var(--vs-keyword); }
        .fn { color: var(--vs-func); }
        .st { color: var(--vs-string); }
        .co { color: var(--vs-comment); }

        /* --- INPUT --- */
        .input-container { padding: 15px 15px 25px 15px; background: #000; }
        .input-box { background: #0c0c0c; border: 1px solid var(--border); border-radius: 14px; display: flex; padding: 5px 15px; max-width: 800px; margin: 0 auto; }
        .input-box input { flex: 1; background: transparent; border: none; color: #fff; padding: 12px 0; font-size: 15px; }
        .send-icon { color: var(--accent); cursor: pointer; font-size: 22px; padding: 10px; }

        /* --- MODALS --- */
        .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 92%; max-width: 380px; background: #080808; border: 1px solid var(--accent); padding: 30px; border-radius: 20px; z-index: 6000; display: none; }
        .modal-close { background: #1a1a1a; color: #fff; border: none; padding: 12px; border-radius: 8px; width: 100%; cursor: pointer; margin-top: 20px; font-weight: 700; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="auth-guard">
        <div class="auth-panel">
            <h2 style="color:var(--accent); margin-bottom: 5px; font-size: 28px;">OCTOPUS GPT</h2>
            <p style="font-size: 9px; color: #444; margin-bottom: 30px; letter-spacing: 3px;">LETHAL VULNERABILITY ENGINE</p>
            <div id="login-view">
                <input type="text" id="l-user" placeholder="USERNAME">
                <input type="password" id="l-key" placeholder="ACCESS KEY">
                <button class="auth-go" onclick="authLogin()">UNLEASH</button>
                <p style="font-size:11px; color:#444; margin-top:25px; cursor:pointer;" onclick="switchAuth('reg')">NEW RAT? REGISTER</p>
            </div>
            <div id="reg-view" style="display:none;">
                <input type="text" id="r-user" placeholder="CHOOSE USERNAME">
                <button class="auth-go" onclick="authReg()">CREATE ACCOUNT</button>
                <p style="font-size:11px; color:#444; margin-top:25px; cursor:pointer;" onclick="switchAuth('login')">LOGIN INSTEAD</p>
            </div>
        </div>
    </div>

    <div id="nav-dim" onclick="toggleNav()"></div>
    <nav id="sidebar">
        <div class="nav-logo"><div class="logo-sq"></div><div class="logo-txt">OCTOPUS GPT</div></div>
        <div class="nav-btn" onclick="location.reload()"><span>+</span> Fresh Session</div>
        <div class="nav-btn" onclick="openModal('about-pop')"><span>🧠</span> The Architect</div>
        <div class="nav-btn" onclick="logout()" style="color:var(--accent); font-weight:800; margin-top:auto;">LOGOUT</div>
    </nav>

    <div class="modal" id="about-pop">
        <h3 style="color:var(--accent)">THE ARCHITECT</h3>
        <p style="font-size:13px; color:#888;">18-year-old Master Researcher. I build lethal logic while you rot in school. 💀</p>
        <button class="modal-close" onclick="closeModals()">CLOSE</button>
    </div>

    <main>
        <header>
            <div id="menu-trigger" onclick="toggleNav()">&#9776;</div>
            <div class="header-title">OCTOPUS GPT 🐙</div>
            <div id="op-id" style="font-size:9px; color:#444; font-weight:bold;">OFFLINE</div>
        </header>

        <div id="chat-flow">
            <div class="bubble bot-msg">> OCTOPUS ONLINE. Speak up, bitch.</div>
        </div>

        <div class="input-container">
            <div class="input-box">
                <input type="text" id="user-in" placeholder="Type a message..." autocomplete="off" onkeypress="if(event.key==='Enter') pushMsg()">
                <div class="send-icon" onclick="pushMsg()">&#10148;</div>
            </div>
        </div>
    </main>

    <script>
        const SB_U = "https://yhxwmfxntcrycvekyrkz.supabase.co";
        const SB_K = "sb_publishable_qACXHtXO6rTQzt7SPdrBlw_OLX4pEvE";
        const db = supabase.createClient(SB_U, SB_K);

        window.onload = () => {
            const u = localStorage.getItem('octo_user');
            if(u) {
                document.getElementById('auth-guard').style.display = 'none';
                document.getElementById('op-id').innerText = u.toUpperCase();
            }
        };

        function switchAuth(m) {
            document.getElementById('login-view').style.display = m === 'login' ? 'block' : 'none';
            document.getElementById('reg-view').style.display = m === 'reg' ? 'block' : 'none';
        }

        async function authReg() {
            const u = document.getElementById('r-user').value.trim().toLowerCase();
            const key = `OCTO-${Math.random().toString(36).substring(2,10).toUpperCase()}`;
            await db.from('octopus_users').insert([{ username: u, license_key: key }]);
            alert(`YOUR KEY: ${key}`);
            location.reload();
        }

        async function authLogin() {
            const u = document.getElementById('l-user').value.trim().toLowerCase();
            const k = document.getElementById('l-key').value.trim();
            const { data } = await db.from('octopus_users').select('*').eq('username', u).eq('license_key', k).single();
            if(data) { localStorage.setItem('octo_user', u); location.reload(); }
            else alert("WRONG KEY, BITCH.");
        }

        function logout() { localStorage.clear(); location.reload(); }

        async function pushMsg() {
            const input = document.getElementById('user-in');
            const txt = input.value.trim();
            if(!txt) return;

            addBubble(txt, 'user-msg');
            input.value = '';

            const flow = document.getElementById('chat-flow');
            const thinkDiv = document.createElement('div');
            thinkDiv.className = 'bubble bot-msg';
            thinkDiv.innerHTML = `<span style="color:var(--pink)">🐙 OCTOPUS IS COOKING... WAIT BITCH... 🔥</span>`;
            flow.appendChild(thinkDiv);
            flow.scrollTop = flow.scrollHeight;

            try {
                const res = await fetch("https://octopus-backend.lreckstore.workers.dev/", {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ message: txt })
                });
                const data = await res.json();
                
                // Format AI Response
                let html = marked.parse(data.response);
                thinkDiv.innerHTML = html;

                // VS CODE COLORING LOGIC
                thinkDiv.querySelectorAll('pre code').forEach((block) => {
                    let text = block.innerHTML;
                    text = text.replace(/\b(const|let|var|function|return|if|else|for|while|await|async|import|export)\b/g, '<span class="kw">$1</span>');
                    text = text.replace(/(\".*?\"|\'.*?\')/g, '<span class="st">$1</span>');
                    text = text.replace(/(\w+)(?=\s*\()/g, '<span class="fn">$1</span>');
                    text = text.replace(/(\/\/.*)/g, '<span class="co">$1</span>');
                    block.innerHTML = text;
                });

            } catch (e) { thinkDiv.innerText = "> UPLINK ERROR."; }
            flow.scrollTop = flow.scrollHeight;
        }

        function addBubble(text, cls) {
            const div = document.createElement('div');
            div.className = `bubble ${cls}`;
            div.innerText = text;
            document.getElementById('chat-flow').appendChild(div);
            document.getElementById('chat-flow').scrollTop = document.getElementById('chat-flow').scrollHeight;
        }

        function toggleNav() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('nav-dim').classList.toggle('open'); }
        function openModal(id) { document.getElementById(id).style.display = 'block'; }
        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
    </script>
</body>
</html>
